<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NemesioScan</title>  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1117;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 500px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 30px;
    }

    .header p {
      color: #9ca3af;
      margin-top: 5px;
    }

    .card {
      background: #181b24;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #292d39;
    }

    .scan-button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    #reader {
      display: none;
      width: 100%;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
    }

    .student-info {
      display: none;
    }

    .student-info h2 {
      margin-bottom: 15px;
    }

    .info {
      margin: 10px 0;
      color: #d1d5db;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .action-button {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #272b36;
      color: white;
      cursor: pointer;
    }

    .records {
      color: #9ca3af;
      text-align: center;
      padding: 20px;
    }
  </style></head><body>  <div class="app"><div class="header">
  <h1>NemesioScan</h1>
  <p>Student Information & Records System</p>
</div>

<div class="card">

  <button class="scan-button" onclick="startScanner()">
    📷 Scan Student ID
  </button>

  <div id="reader"></div>

</div>

<div class="card student-info" id="studentInfo">

  <h2>Student Information</h2>

  <div class="info">
    <strong>Name:</strong>
    <span id="studentName">Unknown</span>
  </div>

  <div class="info">
    <strong>Student ID:</strong>
    <span id="studentId">Unknown</span>
  </div>

  <div class="info">
    <strong>Grade & Section:</strong>
    <span id="studentSection">Unknown</span>
  </div>

  <div class="actions">

    <button class="action-button" onclick="addIncident()">
      ➕ Add Incident
    </button>

    <button class="action-button" onclick="addNote()">
      📝 Add Note
    </button>

    <button class="action-button" onclick="viewRecords()">
      📋 View Records
    </button>

    <button class="action-button" onclick="positiveRecord()">
      ⭐ Positive Record
    </button>

  </div>

</div>

<div class="card">

  <h2>Recent Records</h2>

  <div class="records">
    No records yet.
  </div>

</div>

  </div>  <script>

    const SUPABASE_URL =
      "https://tabsjzfyocijmrpegaha.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_wAM5TLqZ9sQ6rt7bC7cZjA_kcz6e4zB";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    let scanner;

    function startScanner() {

      const reader = document.getElementById("reader");

      reader.style.display = "block";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: 250
        },

        async (decodedText) => {

          await scanner.stop();

          reader.style.display = "none";

          findStudent(decodedText);

        },

        (errorMessage) => {

          // Scanner is still searching

        }

      ).catch((error) => {

        alert("Camera permission is required.");

        console.error(error);

      });

    }

    async function findStudent(studentId) {

      const { data, error } = await supabaseClient
        .from("students")
        .select("*")
        .eq("student_id", studentId)
        .single();

      if (error) {

        alert("Student not found.");

        console.error(error);

        return;

      }

      document.getElementById("studentInfo").style.display = "block";

      document.getElementById("studentId").textContent =
        data.student_id;

      document.getElementById("studentName").textContent =
        data.full_name;

      document.getElementById("studentSection").textContent =
        data.grade_section;

    }

    function addIncident() {

      const reason = prompt("What incident happened?");

      if (reason) {

        alert("Incident recorded:\n" + reason);

      }

    }

    function addNote() {

      const note = prompt("Enter a note:");

      if (note) {

        alert("Note recorded:\n" + note);

      }

    }

    function viewRecords() {

      alert("Student records will appear here.");

    }

    function positiveRecord() {

      const reason = prompt("Enter positive record:");

      if (reason) {

        alert("Positive record added:\n" + reason);

      }

    }

  </script></body>
</html>
